name: Polish SWEA docs

# 백준허브가 문제 풀이를 푸시하면, Claude가 각 문제 README를 보강하고
# 루트 README의 인덱스 표를 갱신한다.
on:
  push:
    branches: [main]
    paths:
      - "SWEA/**"        # 문제 폴더가 바뀔 때만 실행

# 같은 브랜치에서 연속 푸시가 와도 순서대로 처리 (인덱스 표 충돌 방지)
concurrency:
  group: polish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  polish:
    # Claude가 GITHUB_TOKEN으로 되커밋한 푸시는 워크플로우를 재트리거하지 않지만,
    # 혹시 모를 무한 루프를 한 번 더 차단한다.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 되커밋/푸시 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # 직전 커밋과 diff를 보기 위해

      - name: Polish with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 저장소는 SWEA 알고리즘 풀이 기록소다. 백준허브가 방금 새 문제 풀이를 푸시했다.
            루트 README.md의 "저장소 운영 방식" 규칙을 먼저 읽고 그 규칙에 맞춰 작업하라.

            1. `git diff --name-only HEAD~1 HEAD` 로 이번 커밋에서 추가/변경된 파일을 확인한다.
               SWEA/<난이도>/<번호. 문제이름>/ 아래에 새로 생긴 문제 폴더들을 대상으로 한다.
            2. 각 문제 폴더의 README.md(백준허브가 만든 지문만 있는 상태)에 아래를 보강한다:
               - 문제 요약 (한두 줄)
               - 풀이 접근 방법
               - 시간/공간 복잡도
               - 사용한 알고리즘 유형 (DP, BFS/DFS, 완전탐색, 그리디, 구현, 문자열, 수학 등)
               이미 보강돼 있으면 건드리지 않는다.
            3. 루트 README.md의 "전체 문제 목록" 표에 각 문제를 한 행씩 추가한다.
               (번호 / 문제 이름 / 난이도 / 유형 / 언어 / 복습 / 링크)
               - 난이도: 폴더 이름(D2~D6, Unrated)
               - 유형: 2번에서 판단한 알고리즘 유형
               - 언어: 폴더에 있는 코드 파일 기준. Python은
                 `<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" width="16"/>`,
                 Java는
                 `<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" width="16"/>`
               - 복습: 비워 둔다 (사용자가 직접 🔁 표시)
               - 링크: 해당 문제 폴더로의 상대 경로
               - "_아직 없음_" 플레이스홀더 행이 있으면 제거한다.
               - 이미 표에 있는 문제면 중복 추가하지 않는다.
            4. 파일 수정만 하고 git 커밋/푸시는 하지 마라. 커밋은 다음 스텝이 처리한다.

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "docs: polish READMEs & update index [skip ci]"
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
